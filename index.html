  <style>
    /* ── dark mode 优先写在最前，避免被后续规则覆盖 ── */
    @media (prefers-color-scheme: dark) {
      html { background-color: #000 }
      body { background-color: #000; color: #fff }

      /* 卡片背景：用 !important 确保覆盖 zeoseven CSS 可能的干扰 */
      .item {
        background-color: #15202b !important;
        color: #ccc !important;
        border-top-color: #888;
        /* 暗色下阴影换淡一些 */
        box-shadow: 0 2em 3em -1em rgba(0,0,0,.8) !important;
      }
      time  { color: #999 }
      h1    { color: #fff }
      aside { color: #ccc }

      .load-btn         { background-color: #000 !important; color: #ddd !important; border-color: #555 }
      .load-btn:hover   { background: #1da1f2 !important; color: #fff !important }

      .type-0 { border-top-color: #ea4c89 !important }
      .type-1 { border-top-color: #337ab7 !important }

      .skeleton {
        background: linear-gradient(90deg, #1a2332 25%, #1e2a3a 50%, #1a2332 75%) !important;
        background-size: 200% 100% !important;
      }
    }
    html { font-size: 20px }
    content { white-space: pre-wrap }
    body, button {
      font-family: Huiwen-mincho, system-ui, -apple-system, BlinkMacSystemFont,
        Tahoma, Arial, "Hiragino Sans GB", "Microsoft YaHei", "WenQuanYi Micro Hei",
        sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      font-weight: 400;
    }
    aside { font-weight: 300; font-style: normal; line-height: 1.8rem }
    #app, footer, header {
      box-sizing: border-box;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      padding: 0 20px;
    }

    h1     { font-weight: 900 }
    footer { font-size: .8rem; clear: both }
    .tip   { color: #999 }

    /* ── 卡片 ── */
    .item {
      font-weight: 300;
      line-height: 1.8rem;
      background: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      margin-top: 20px;
      border-top: 6px solid #ccc; /* 默认颜色，type-x 会覆盖 */
      text-align: justify;
      box-shadow: 0 4em 6em -2em rgba(0,0,0,.5), 1em 2em 3.5em -2.5em rgba(0,0,0,.5);
    }
    .item a { text-decoration: none; color: #5dafd5 }

    /* ── type 颜色 ── */
    .type-0 { border-top-color: #ff4081 }
    .type-1 { border-top-color: #2196f3 }

    /* ── 机型标签：通过 data-device 属性显示，JS 端填充 ── */
    .equipment::after {
      float: right;
      font-size: 15px;
      content: attr(data-device);
    }

    time { font-weight: 200; color: #999; display: inline-block }
    tag  { font-size: 15px; display: block; color: #999 }

    .center-text   { text-align: center }
    .center-text a { color: #ea4c89; text-decoration: none }

    /* ── 加载更多按钮 ── */
    .load-ctn { width: 100%; overflow: hidden } /* clearfix for float */
    .load-btn {
      border: 2px solid #666;
      width: 130px;
      outline: 0;
      font-size: 20px;
      border-radius: 100px;
      margin: 30px 0 30px auto; /* 右对齐，不用 float */
      display: block;
      color: #666;
      line-height: 30px;
      background: #fff;
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .load-btn:hover        { background: #1da1f2; color: #fff; border-color: #1da1f2 }
    .load-btn:active       { background: #666; color: #fff }
    .load-btn:disabled     { opacity: .5; cursor: not-allowed }

    img { width: 100% }

    /* ── 骨架屏 ── */
    .skeleton {
      border-radius: 5px;
      margin-top: 20px;
      height: 100px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e4e4e4 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0 } }
    @media (prefers-reduced-motion: reduce) { .skeleton { animation: none } }

    /* ── 标题栏 ── */
    .title { display: flex; align-items: center; font-weight: 700; height: 57.6px }
  </style>

<body>
  <header>
    <div class="title">
      <h1>
        <a href="https://xsbb.767373.xyz/" style="color:inherit;font-size:inherit;text-decoration:none">
          小声 BB
        </a>
      </h1>
    </div>
  </header>

  <main id="app">
    <aside><p>致我那终将逝去的青春</p></aside>
    <p class="tip">至今总共哔哔了 <span id="count">…</span> 条</p>

    <!-- 列表容器：JS 动态插入 <section class="item"> -->
    <div id="list"></div>

    <!-- 骨架屏：默认隐藏，首次加载时由 JS 显示 -->
    <div id="skeleton" style="display:none">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>

    <!-- 加载更多按钮（放在哨兵之前，结构清晰） -->
    <div class="load-ctn">
      <button class="load-btn" id="load-btn">再翻翻</button>
    </div>

    <!-- 无限滚动哨兵：放在按钮下方，滚过按钮才触发，不会误触发 -->
    <div id="scroll-sentinel" style="height:1px"></div>
  </main>

  <footer>
    <p class="center-text">
      <b>Copyright &copy; 2024 xsbb, All Rights Reserved</b>
    </p>
  </footer>

  <!-- 去掉 vue.min.js，节省 ~33KB -->
  <script defer src="./js/av-min.js"></script>
  <script defer src="./js/xsbb.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(
            regs
              .filter(r => r.scope !== 'https://xsbb.767373.xyz/')
              .map(r => r.unregister())
          );
          await navigator.serviceWorker.register('./sw.js');
        } catch (e) { console.warn('SW:', e); }
      });
    }
  </script>
</body>
