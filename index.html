  <style>
    /* ── Dark mode ── */
    @media (prefers-color-scheme: dark) {
      html, body    { background-color: #000 !important; color: #fff }
      .item         { background-color: #15202b !important; color: #ccc !important;
                      box-shadow: 0 2em 3em -1em rgba(0,0,0,.8) !important; }
      time          { color: #999 }
      aside         { color: #ccc }
      .load-btn     { background-color: #000 !important; color: #ddd !important; border-color: #555 }
      .load-btn:hover { background: #1da1f2 !important; color: #fff !important }
      .type-0       { border-top-color: #ea4c89 !important }
      .type-1       { border-top-color: #337ab7 !important }
      .skeleton     { background: linear-gradient(90deg,#1a2332 25%,#1e2a3a 50%,#1a2332 75%) !important;
                      background-size: 200% 100% !important; }
    }

    /* ── Reset / Base ── */
    *, *::before, *::after { box-sizing: border-box }
    html   { font-size: 20px }
    body   { margin: 0; background: #f5f5f5 }
    content { white-space: pre-wrap }
    img    { width: 100% }
    tag    { font-size: 15px; display: block; color: #999 }

    body, button {
      font-family: Huiwen-mincho, system-ui, -apple-system, BlinkMacSystemFont,
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif,
        "Apple Color Emoji", "Segoe UI Emoji";
    }

    /* ── Layout ── */
    header, #app, footer {
      width: 100%; max-width: 500px;
      margin: 0 auto; padding: 0 20px;
    }

    /* ── Header ── */
    .title {
      display: flex; align-items: center;
      height: 57.6px; font-weight: 700;
    }
    h1 { margin: 0; font-weight: 900; font-size: 1.2rem }
    h1 a { color: inherit; text-decoration: none }

    /* ── Aside ── */
    aside { font-weight: 300; line-height: 1.8rem; color: #555 }
    .tip  { color: #999; font-size: .85rem }

    /* ── Card ── */
    .item {
      background: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      margin-top: 20px;
      border-top: 6px solid #ccc;
      text-align: justify;
      font-weight: 300;
      line-height: 1.8rem;
      box-shadow: 0 4em 6em -2em rgba(0,0,0,.5), 1em 2em 3.5em -2.5em rgba(0,0,0,.5);
    }
    .item a  { text-decoration: none; color: #5dafd5 }
    .type-0  { border-top-color: #ff4081 }
    .type-1  { border-top-color: #2196f3 }
    time     { font-weight: 200; color: #999; display: inline-block }

    /* ── Equipment tag ── */
    .equipment::after {
      float: right;
      font-size: 15px;
      content: attr(data-device);
    }

    /* ── 加载更多 ── */
    .load-ctn  { width: 100%; margin-top: 10px }
    .load-btn  {
      display: block;
      border: 2px solid #666;
      width: 130px; margin-left: auto;
      outline: 0; font-size: 20px;
      border-radius: 100px;
      padding: 4px 0;
      color: #666; background: #fff;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .load-btn:hover    { background: #1da1f2; color: #fff; border-color: #1da1f2 }
    .load-btn:active   { background: #666; color: #fff }
    .load-btn:disabled { opacity: .5; cursor: not-allowed }

    /* ── 骨架屏 ── */
    .skeleton {
      border-radius: 5px; margin-top: 20px; height: 100px;
      background: linear-gradient(90deg,#ececec 25%,#e0e0e0 50%,#ececec 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0 } }
    @media (prefers-reduced-motion: reduce) { .skeleton { animation: none } }

    /* ── Footer ── */
    footer { font-size: .8rem; text-align: center; padding: 30px 20px; color: #999 }
  </style>

<header>
  <div class="title">

</header>

<main id="app">
  <aside><p>致我那终将逝去的青春</p></aside>
  <p class="tip">至今总共哔哔了 <span id="count">…</span> 条</p>

  <!-- 列表：JS 动态插入 -->
  <div id="list"></div>

  <!-- 骨架屏 -->
  <div id="skeleton" style="display:none">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <!-- 按钮 -->
  <div class="load-ctn">
    <button class="load-btn" id="load-btn">再翻翻</button>
  </div>

  <!-- 无限滚动哨兵（在按钮下方） -->
  <div id="scroll-sentinel" style="height:1px"></div>
</main>

<footer>Copyright &copy; <span id="cy"></span> xsbb &nbsp;·&nbsp; All Rights Reserved</footer>

<script defer src="./js/app.js"></script>

<script>
  document.getElementById('cy').textContent = new Date().getFullYear();
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(
          regs.filter(r => r.scope !== location.origin + '/').map(r => r.unregister())
        );
        await navigator.serviceWorker.register('./sw.js');
      } catch(e) { console.warn('SW:', e); }
    });
  }
</script>

</body>
