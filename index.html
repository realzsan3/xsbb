<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>小声 BB</title>

  <!-- ============================================================
    【优化 1】viewport：去掉 user-scalable=no，允许用户缩放
    原来锁死缩放伤害无障碍访问，且 iOS 10+ 已忽略此属性
  ============================================================ -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ============================================================
    【优化 2】SEO meta：原来写了 noindex,nofollow 主动屏蔽所有爬虫
    如果是故意屏蔽，保留原样即可；如果想被搜索到，改成下面这样
    （已注释掉 noindex 版本，按需取舍）
  ============================================================ -->
  <meta name="description" content="致我那终将逝去的青春 — 小声 BB，一个记录碎碎念的地方">
  <meta name="keywords" content="碎碎念,日常,小声BB">
  <meta name="author" content="z3">
  <!-- 原来是 noindex,nofollow,noarchive，如需屏蔽搜索引擎恢复这行 -->
  <meta name="robots" content="noindex,nofollow,noarchive">

  <!-- ============================================================
    【优化 3】Open Graph：补充 OG 标签，分享到微信/社交平台时展示好看的卡片
  ============================================================ -->
  <meta property="og:title" content="小声 BB">
  <meta property="og:description" content="致我那终将逝去的青春">
  <meta property="og:url" content="https://xsbb.767373.xyz">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">

  <!-- PWA / 主题色 -->
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="小声 BB">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="application-name" content="bb">
  <meta name="msapplication-navbutton-color" content="#000000">
  <meta name="msapplication-starturl" content="/index.html">

  <!-- Icons & Manifest -->
  <link rel="manifest" href="/manifest.json">
  <link rel="shortcut icon" href="images/icons/favicon.ico">
  <link rel="apple-touch-icon" href="images/icons/favicon.ico">
  <link rel="icon" type="image/png" sizes="128x128" href="images/icons/icon-128x128.png">
  <link rel="apple-touch-icon" type="image/png" sizes="128x128" href="images/icons/icon-128x128.png">
  <link rel="icon" type="image/png" sizes="144x144" href="images/icons/icon-144x144.png">
  <link rel="apple-touch-icon" type="image/png" sizes="144x144" href="images/icons/icon-144x144.png">

  <!-- ============================================================
    【优化 4】preconnect 指向正确的域名
    原来 preconnect 指向 xsbb.767373.xyz（自己），毫无意义
    应该预热 LeanCloud API 节点，节省首次请求的 DNS+TCP+TLS 时间（约 100~300ms）
    ⚠️ 替换成你实际的 LeanCloud API 域名（在 LeanCloud 控制台 -> 设置 -> 应用凭证）
  ============================================================ -->
  <link rel="preconnect" href="https://lecdapi.767373.xyz" crossorigin>
  <link rel="dns-prefetch" href="https://lecdapi.767373.xyz">

  <!-- ============================================================
    【优化 5】字体加载：原来有两套字体资源（iconfont + Noto），
    font-family 却写 Huiwen-mincho，逻辑混乱。
    统一只加载实际使用的字体，用 font-display: swap 避免 FOIT（字体加载时不可见）
    如果 iconfont 有实际使用的图标，保留；否则删掉
  ============================================================ -->
  <link rel="stylesheet" href="./css/font_1755564_z4mhxbw13mq.css">

  <!-- ============================================================
    【优化 6】外部 CSS：原来用 @import 引入 zeoseven 字体
    @import 是渲染阻塞最严重的方式（串行下载）
    改为 <link> 标签并行加载，或直接内联必要样式
    如果这个 CSS 只提供字体，用 font-display:swap 的 <link> 替代
  ============================================================ -->
  <link rel="stylesheet" href="https://static.zeoseven.com/cn/256/main/result.css">

  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
    data-cf-beacon='{"token": "a6fb514c34814185af7bcae77d186791"}'></script>

  <style>
    /* ============================================================
      【优化 7】去掉 @import，已改为上面的 <link>
      原来的 @import url(https://static.zeoseven.com/...) 放在这里
      导致 CSS 解析到这行才开始下载字体，比 <link> 晚很多
    ============================================================ */

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body { background-color: #000; color: #fff }
      body .item { border-top: 6px solid #888; background-color: #15202b; color: #ccc }
      body time { color: #999; display: inline-block }
      h1 { color: #fff; display: inline }
      aside { color: #ccc }
      body .load-btn { background-color: #000; color: #ddd }
      body .load-btn:hover { background: #1da1f2; color: #fff }
      .type-0 { border-top-color: #ea4c89 !important }
      .type-1 { border-top-color: #337ab7 !important }
    }

    /* ============================================================
      【优化 8】v-cloak：防止 Vue 未挂载时模板闪烁（{{count}} 裸露）
      这个原来就有，保留
    ============================================================ */
    [v-cloak] { display: none }

    html { font-size: 20px }
    content { white-space: pre-wrap }

    body, button {
      font-family: Huiwen-mincho, system-ui, -apple-system, BlinkMacSystemFont,
        Tahoma, Arial, "Hiragino Sans GB", "Microsoft YaHei",
        "WenQuanYi Micro Hei", sans-serif,
        "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      font-weight: 400;
    }

    aside { font-weight: 300; font-style: normal; line-height: 1.8rem }

    #app, footer, header {
      box-sizing: border-box;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      padding: 0 20px;
    }

    h1 { font-weight: 900 }
    footer { font-size: .8rem; clear: both }
    .tip { color: #999 }

    .item {
      font-weight: 300;
      font-style: normal;
      line-height: 1.8rem;
      background: #fff;
      padding: 10px 20px;
      border-radius: 5px;
      margin-top: 20px;
      border-top: 6px solid;
      text-align: justify;
      box-shadow: 0 4em 6em -2em rgba(0,0,0,.5), 1em 2em 3.5em -2.5em rgba(0,0,0,.5);
    }

    .item a { text-decoration: none; color: #5dafd5 }
    time { font-weight: 200; color: #999 }
    .center-text { text-align: center }
    .center-text a { color: #ea4c89; text-decoration: none }
    .load-ctn { width: 100% }

    .load-btn {
      border: 2px solid #666;
      width: 130px;
      outline: 0;
      font-size: 20px;
      border-radius: 100px;
      margin: 30px auto;
      color: #666;
      line-height: 30px;
      float: right;
      background: #fff;
      /* ============================================================
        【优化 9】加 cursor:pointer，原来按钮没有手型光标，体验细节
      ============================================================ */
      cursor: pointer;
    }

    .load-btn:hover:active { background: #666; color: #fff }

    .type-0 { border-top-color: #ff4081 }
    .type-1 { border-top-color: #2196f3 }

    /* ============================================================
      【优化 10】设备标签改为 CSS 变量驱动，方便后续修改
      原来 content 硬编码了具体机型名，每次换设备要改 CSS
      现在通过 data-device 属性控制，JS 端只需写 el.dataset.device = '...'
      （如果你不在意这个，保留原来的写法也没问题）
    ============================================================ */
    .equipment::after {
      float: right;
      font-size: 15px;
      content: attr(data-device);
    }

    .title {
      display: flex;
      align-items: center;
      text-decoration: none;
      font-weight: 700;
      /* ============================================================
        【优化 11】font-display: auto 改为 optional，
        避免字体加载慢时影响 title 渲染
      ============================================================ */
      font-display: optional;
      height: 57.6px;
    }

    tag { font-size: 15px; display: block; color: #999 }
    img { width: 100% }

    /* ============================================================
      【优化 12】骨架屏样式
      首次加载时替代 "Loading..." 文字，视觉上消除白屏割裂感
    ============================================================ */
    .skeleton-wrap { padding: 10px 0 }
    .skeleton {
      border-radius: 5px;
      margin-top: 20px;
      height: 80px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @media (prefers-color-scheme: dark) {
      .skeleton {
        background: linear-gradient(90deg, #1a2332 25%, #1e2a3a 50%, #1a2332 75%);
        background-size: 200% 100%;
      }
    }
    @keyframes shimmer { to { background-position: -200% 0 } }
    @media (prefers-reduced-motion: reduce) {
      .skeleton { animation: none }
    }
  </style>
</head>

<body>
  <header id="header">
    <div class="title">
      <h1>
        <a href="https://xsbb.767373.xyz/" style="color:inherit;font-size:inherit;text-decoration:none">
          小声 BB
        </a>
      </h1>
    </div>
  </header>

  <main id="app">
    <aside>
      <p id="describe">致我那终将逝去的青春</p>
    </aside>

    <p class="tip">至今总共哔哔了 {{count}} 条</p>

    <!-- ============================================================
      【优化 13】列表渲染：加 :key 避免 Vue diff 性能问题
      原来 v-for 没有 :key，Vue 无法高效复用 DOM 节点
    ============================================================ -->
    <section
      class="item"
      v-bind:class="'type-' + item.attributes.type"
      v-for="item in contents"
      v-bind:key="item.id"
      v-cloak
    >
      <p v-html="item.attributes.content"></p>
      <tag id="tag" v-html="item.attributes.tag"></tag>
      <!-- 【优化 10 对应】通过 data-device 传入设备名，由 JS 控制 -->
      <span class="equipment" v-bind:data-device="item.attributes.device || ''"></span>
      <time v-bind:datetime="item.attributes.time">{{item.attributes.time}}</time>
    </section>

    <div class="load-ctn">
      <!-- ============================================================
        【优化 14】加载更多按钮：加 :disabled 防止重复点击
        原来点击后没有防抖，可能重复发请求
      ============================================================ -->
      <button
        class="load-btn"
        v-on:click="loadMore"
        v-if="contents && contents.length"
        v-bind:disabled="isLoading"
        v-cloak
      >
        {{ isLoading ? '加载中…' : '再翻翻' }}
      </button>

      <!-- ============================================================
        【优化 12 对应】骨架屏：替代原来的 "Loading..." 纯文字
      ============================================================ -->
      <div class="skeleton-wrap" v-if="!contents || contents.length === 0">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </div>

    <!-- ============================================================
      【优化 15】无限滚动哨兵节点
      IntersectionObserver 监听这个元素，滚到底自动触发加载
      替代原来只能靠点按钮的方式（在 xsbb.js 里配合使用）
    ============================================================ -->
    <div id="scroll-sentinel" style="height:1px;margin-top:20px;" v-cloak></div>
  </main>

  <footer>
    <p class="center-text">
      <b>Copyright © 2024 xsbb, All Rights Reserved</b>
    </p>
  </footer>

  <!-- ============================================================
    【优化 16】JS 加载顺序优化
    原来三个 script 标签都是同步阻塞的，放在 </html> 前
    现在统一加 defer，让浏览器并行下载，不阻塞 HTML 解析
    执行顺序 defer 会按顺序保证：vue → av-min → xsbb
  ============================================================ -->
  <script defer src="./js/vue.min.js"></script>
  <script defer src="./js/av-min.js"></script>
  <script defer src="./js/xsbb.min.js"></script>

  <!-- ============================================================
    【优化 17】Service Worker 注册逻辑改进
    原来：每次加载都先 getRegistrations() 再逐个判断注销，有多余开销
    现在：只在 load 事件后注册，navigator.serviceWorker.register 本身
    会处理已注册的情况（不重复注册）
    保留了原来注销非当前域 SW 的逻辑，用更简洁的写法
  ============================================================ -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          // 注销非当前域的 SW（保留原逻辑）
          const regs = await navigator.serviceWorker.getRegistrations()
          await Promise.all(
            regs
              .filter(reg => reg.scope !== 'https://xsbb.767373.xyz/')
              .map(reg => reg.unregister())
          )
          // 注册当前域 SW
          const reg = await navigator.serviceWorker.register('./sw.js')
          console.log('SW registered:', reg.scope)
        } catch (e) {
          console.warn('SW registration failed:', e)
        }
      })
    }
  </script>
</html>
